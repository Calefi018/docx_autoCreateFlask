<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HubMaster - Acesso Restrito</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* =======================================================
           ESTILOS EXCLUSIVOS DA TELA DE LOGIN (Premium Dark)
           ======================================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: #020617; /* Fundo Slate 950 (Abismo) */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Mantém os orbes dentro da tela */
            position: relative;
        }

        /* ANIMAÇÃO DE FUNDO (Orbes de Luz Flutuantes) */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 1;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(59, 130, 246, 0.15); /* Azul Primário Translúcido */
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(139, 92, 246, 0.15); /* Roxo Translúcido */
            bottom: -50px; right: 10%;
            animation-delay: -5s;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        /* CAIXA DE LOGIN (Glassmorphism) */
        .login-container {
            position: relative;
            z-index: 10; /* Fica acima dos orbes */
            width: 100%;
            max-width: 420px;
            margin: 20px;
            background: rgba(15, 23, 42, 0.7); /* Slate 900 transparente */
            backdrop-filter: blur(20px); /* Efeito de vidro fosco */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); /* Borda sutil */
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out; /* Animação de entrada */
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGO E TÍTULOS */
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6); /* Gradiente Azul para Roxo */
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            margin-bottom: 15px;
        }
        .logo-icon i { font-size: 32px; color: white; }

        .logo-text { font-size: 24px; font-weight: 700; color: #f8fafc; letter-spacing: -0.5px; }
        .logo-sub { font-size: 13px; color: #94a3b8; margin-top: 5px; }

        /* FORMULÁRIO E INPUTS */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #cbd5e1; margin-bottom: 8px; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: #64748b; font-size: 18px;
            transition: 0.2s;
        }
        
        input {
            width: 100%; padding: 14px 14px 14px 42px;
            background: rgba(0, 0, 0, 0.2); /* Fundo escuro transparente */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white; font-size: 14px;
            transition: all 0.3s; outline: none;
        }
        input:focus {
            border-color: #3b82f6; /* Borda Azul no Foco */
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); /* Brilho sutil */
        }
        input:focus + i { color: #3b82f6; } /* Ícone fica azul no foco */

        /* BOTÃO DE LOGIN ACESO */
        .btn-login {
            width: 100%; padding: 14px; margin-top: 10px;
            background: #3b82f6; /* Azul Primário */
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-login:hover {
            background: #2563eb; /* Azul mais escuro no hover */
            transform: translateY(-2px); /* Efeito de flutuar */
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.4);
        }

        /* MENSAGENS FLASH (ERROS) */
        .flash-msg {
            background: rgba(239, 68, 68, 0.1); /* Fundo vermelho transparente */
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171; padding: 12px; border-radius: 8px; font-size: 13px;
            text-align: center; margin-bottom: 20px; font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        <div class="logo-box">
            <div class="logo-icon"><i class="ph-bold ph-asterisk"></i></div>
            <div class="logo-text">HubMaster Core</div>
            <div class="logo-sub">Autenticação Segura</div>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-msg"><i class="ph-bold ph-warning-circle"></i> {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label">Nome de Usuário</label>
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="Digite seu acesso" required autocomplete="off">
                    <i class="ph-bold ph-user"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Senha de Acesso</label>
                <div class="input-wrapper">
                    <input type="password" name="password" placeholder="••••••••" required>
                    <i class="ph-bold ph-lock-key"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">Acessar Sistema</button>
        </form>
    </div>

</body>
</html>
