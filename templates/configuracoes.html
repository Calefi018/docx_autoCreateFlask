{% extends "base.html" %}
{% block content %}

<div style="margin-bottom: 30px;">
    <h1 style="margin-top:0; color: var(--primary); font-size: 24px; display: flex; align-items: center; gap: 10px;">
        <i class="ph-bold ph-sliders"></i> Configurações do Sistema
    </h1>
    <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 14px;">
        Gerencie os motores de Inteligência Artificial, chaves de API e mensagens do CRM.
    </p>
</div>

<form method="POST" action="/configuracoes" style="display: flex; flex-direction: column; gap: 20px;">
    
    <div class="card" style="margin-bottom: 0; border-top: 3px solid var(--primary);">
        <h2 style="font-size: 16px; color: var(--text-main); margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
            <i class="ph-bold ph-cpu" style="color: var(--primary);"></i> Motores de IA
        </h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 25px;">
            {% for m in todos_modelos %}
            <label class="toggle-wrapper" style="cursor: pointer; display: block;">
                <input type="checkbox" name="modelos_ativos" value="{{ m }}" {% if m in modelos_ativos %}checked{% endif %} style="display: none;">
                <div class="toggle-card" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 15px; display: flex; align-items: center; gap: 10px; color: var(--text-muted);">
                    <i class="ph-bold ph-check-circle check-icon" style="font-size: 20px;"></i>
                    <span style="font-family: 'JetBrains Mono', monospace; font-size: 12px;">{{ m }}</span>
                </div>
            </label>
            {% endfor %}
        </div>

        <div style="background: rgba(59, 130, 246, 0.05); padding: 20px; border-radius: 8px; border: 1px dashed rgba(59, 130, 246, 0.3);">
            <label style="font-size: 13px; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 600;">
                <i class="ph-bold ph-plus-circle"></i> Adicionar Nova IA
            </label>
            <input type="text" name="novo_modelo" placeholder="Ex: google/gemini-pro-1.5" style="background: rgba(0,0,0,0.4); border-color: rgba(59, 130, 246, 0.2);">
        </div>
    </div>

    <div class="card" style="margin-bottom: 0;">
        <h2 style="font-size: 16px; color: var(--success); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <i class="ph-bold ph-whatsapp-logo"></i> Mensagem Padrão de Entrega
        </h2>
        <textarea name="whatsapp_template" rows="5" required style="resize: vertical; font-size: 13px; line-height: 1.5; color: var(--text-main);">{{ config.whatsapp_template }}</textarea>
    </div>

    <div class="card" style="margin-bottom: 0; border-left: 4px solid var(--danger); background: rgba(220, 38, 38, 0.02);">
        <h2 style="font-size: 16px; color: var(--danger); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <i class="ph-bold ph-lock-key"></i> Segurança e APIs
        </h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div>
                <label style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">Senha Master</label>
                <input type="text" name="prompt_password" value="{{ config.prompt_password or '' }}" placeholder="Ex: admin123" style="font-family: monospace;">
            </div>
            <div>
                <label style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">ConvertAPI Secret Key</label>
                <input type="text" name="convert_api_key" value="{{ config.convert_api_key or '' }}" placeholder="Chave da API" style="font-family: monospace;">
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary" style="padding: 16px; font-size: 16px; font-weight: 700; width: 100%;">
        <i class="ph-bold ph-floppy-disk"></i> Salvar Todas as Configurações
    </button>
</form>

<style>
    .toggle-wrapper input:checked + .toggle-card { background: rgba(59, 130, 246, 0.1) !important; border-color: var(--primary) !important; color: var(--text-main) !important; }
    .toggle-wrapper input:checked + .toggle-card .check-icon { color: var(--primary) !important; }
</style>
{% endblock %}
