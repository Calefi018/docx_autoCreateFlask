{% extends "base.html" %}
{% block content %}
    <h1 style="margin-top:0;">Gerador de Trabalhos</h1>
    
    <form id="formGerar" class="card">
        <label><b>1. Para qual Cliente é este trabalho?</b></label>
        <select name="aluno_id" id="aluno_id">
            <option value="">Não vincular a nenhum cliente (Apenas Baixar Documento)</option>
            {% for aluno in alunos %}
                <option value="{{ aluno.id }}">{{ aluno.nome }} - {{ aluno.curso }}</option>
            {% endfor %}
        </select>

        <div id="container_temas_salvos" style="display: none; margin-top: 15px;">
            <label style="color: var(--warning);"><b><i class="ph-fill ph-book-bookmark"></i> Temas Salvos do Cliente</b></label>
            <select id="select_tema_salvo">
                <option value="">Selecione para preencher automaticamente...</option>
            </select>
        </div>

        <label style="margin-top: 15px; display: block;"><b>2. Tema do Desafio</b></label>
        <textarea name="tema" id="tema" rows="6" placeholder="Cole aqui as instruções..." required></textarea>

        <div style="display:flex; gap:15px; flex-wrap:wrap; margin-top: 15px;">
            <div style="flex:1; min-width: 250px;">
                <label><b>3. Padrão / Cérebro da IA</b></label>
                <select name="prompt_id">
                    {% for p in prompts %}
                        <option value="{{ p.id }}">{{ p.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="flex:1; min-width: 250px;">
                <label><b>4. Inteligência Principal</b></label>
                <select name="modelo" id="select_modelo">
                    {% for modelo in modelos %}
                        <option value="{{ modelo }}">{{ modelo }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button type="button" class="btn" style="width: 100%; padding: 15px; font-size: 1.1rem; margin-top: 20px;" id="btn-submit" onclick="iniciarGeracao()">
            <i class="ph-bold ph-magic-wand"></i> Gerar Trabalho Completo com IA
        </button>
        
        <div id="loading" style="display:none; margin-top: 30px; text-align: center; padding: 30px; border: 1px solid var(--border); border-radius: 12px; background: rgba(30,33,48,0.8); box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            <div style="font-size: 3.5rem; color: var(--primary); margin-bottom: 15px;" id="loading-icon">
                <i class="ph-bold ph-brain" style="animation: pulse-brain 1.5s infinite;"></i>
            </div>
            <h3 style="color: var(--primary); margin-top: 0; font-size: 1.3rem;" id="loading-title">A Inteligência Artificial está a escrever...</h3>
            <p style="color: var(--warning); font-size: 0.95rem; margin-bottom: 25px; font-weight: bold;">
                <i class="ph-fill ph-info"></i> Processando em Segundo Plano.<br>Você pode mudar de aba ou usar outro app, basta voltar nesta tela depois.
            </p>
            
            <div style="width: 100%; height: 12px; background: rgba(0,0,0,0.5); border-radius: 6px; overflow: hidden; position: relative; margin-bottom: 20px;">
                <div style="position: absolute; top: 0; left: -50%; height: 100%; width: 50%; background: linear-gradient(90deg, transparent, var(--primary), #a855f7, transparent); border-radius: 6px; animation: slide-bar 1.5s infinite linear;"></div>
            </div>
            
            <button type="button" class="btn btn-danger" style="padding: 10px 20px; font-size: 0.9rem;" onclick="cancelarGeracao()">
                <i class="ph-bold ph-x-circle"></i> Cancelar Tarefa
            </button>
            
            <style>
                @keyframes pulse-brain { 
                    0% { transform: scale(1); opacity: 0.8; } 
                    50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 15px var(--primary); } 
                    100% { transform: scale(1); opacity: 0.8; } 
                }
                @keyframes slide-bar { 
                    0% { left: -50%; } 
                    100% { left: 100%; } 
                }
            </style>
        </div>
    </form>

    <div id="area-edicao" class="card" style="display:none; margin-top: 30px;">
        <h2 style="color: var(--secondary); margin-top:0;"><i class="ph-fill ph-pencil-simple"></i> Edição Contextual</h2>
        
        <div id="caixas-texto"></div>
        
        <button class="btn btn-warning" style="width: 100%; padding: 15px; margin-top:30px; margin-bottom: 10px; color: #000; font-weight: bold;" onclick="humanizarTrabalho()" id="btn-humanizar">
            <i class="ph-bold ph-shield-check" style="font-size: 1.2rem;"></i> Aplicar Blindagem Anti-IA (Humanizar Tudo)
        </button>

        <button class="btn btn-green" style="width: 100%; padding: 15px; font-size: 1.1rem;" onclick="salvarEDocx()" id="btn-docx">
            <i class="ph-bold ph-check-circle"></i> Aprovar Tudo e Salvar DOCX Final
        </button>
    </div>

    <script>
        let pollInterval;
        let dicionarioEditavel = {};
        let temasCarregados = [];

        window.onload = function() {
            let estadoStr = localStorage.getItem('geracao_estado');
            if(estadoStr) {
                let estado = JSON.parse(estadoStr);
                if(estado.task_id) {
                    if(document.getElementById('aluno_id')) document.getElementById('aluno_id').value = estado.aluno_id;
                    if(document.getElementById('tema')) document.getElementById('tema').value = estado.tema;

                    document.getElementById('btn-submit').style.display = 'none';
                    document.getElementById('area-edicao').style.display = 'none';
                    document.getElementById('loading').style.display = 'block';

                    pollInterval = setInterval(() => verificarStatusTask(estado.task_id), 3000);
                }
            }
        };

        document.getElementById('aluno_id').addEventListener('change', function() {
            let aluno_id = this.value;
            let container = document.getElementById('container_temas_salvos');
            let select = document.getElementById('select_tema_salvo');
            
            if(!aluno_id) { 
                container.style.display = 'none'; 
                return; 
            }
            
            fetch('/api/temas/' + aluno_id)
            .then(r => r.json())
            .then(temas => {
                temasCarregados = temas;
                if(temas.length > 0) {
                    select.innerHTML = '<option value="">Selecione para preencher automaticamente...</option>';
                    temas.forEach(t => { 
                        select.innerHTML += `<option value="${t.id}">${t.titulo || 'Tema sem Título'}</option>`; 
                    });
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            });
        });

        document.getElementById('select_tema_salvo').addEventListener('change', function() {
            let temaIdSelecionado = this.value;
            if(temaIdSelecionado) {
                let temaEncontrado = temasCarregados.find(t => t.id == temaIdSelecionado);
                if(temaEncontrado) {
                    document.getElementById('tema').value = temaEncontrado.texto;
                }
            }
        });

        const ordemOficial = [
            "RESUMO_MEMORIAL", "CONTEXTO_MEMORIAL", "ANALISE_MEMORIAL", 
            "ASPECTO_1", "POR_QUE_1", "ASPECTO_2", "POR_QUE_2", "ASPECTO_3", "POR_QUE_3", 
            "CONCEITOS_TEORICOS", "ANALISE_CONCEITO_1", "ENTENDIMENTO_TEORICO", "SOLUCOES_TEORICAS", 
            "PROPOSTAS_MEMORIAL", "CONCLUSAO_MEMORIAL", "REFERENCIAS_ADICIONAIS", "AUTOAVALIACAO_MEMORIAL"
        ];

        function iniciarGeracao() {
            const btn = document.getElementById('btn-submit');
            const area = document.getElementById('area-edicao');
            const loading = document.getElementById('loading');

            document.getElementById('loading-icon').innerHTML = '<i class="ph-bold ph-brain" style="animation: pulse-brain 1.5s infinite;"></i>';
            document.getElementById('loading-title').innerText = "A Inteligência Artificial está a escrever...";
            
            btn.style.display = 'none';
            area.style.display = 'none';
            loading.style.display = 'block';

            let formData = new FormData(document.getElementById('formGerar'));

            fetch('/gerar_rascunho', { 
                method: 'POST', 
                body: formData 
            })
            .then(res => {
                if(!res.ok) throw new Error("Falha ao comunicar com o servidor.");
                return res.json();
            })
            .then(data => {
                if(!data.sucesso) { 
                    loading.style.display = 'none';
                    btn.style.display = 'block';
                    Swal.fire('Erro da Inteligência', data.erro, 'error'); 
                    return; 
                }
                
                localStorage.setItem('geracao_estado', JSON.stringify({
                    task_id: data.task_id,
                    aluno_id: document.getElementById('aluno_id').value,
                    tema: document.getElementById('tema').value
                }));

                pollInterval = setInterval(() => verificarStatusTask(data.task_id), 3000);
            })
            .catch(err => {
                loading.style.display = 'none';
                btn.style.display = 'block';
                Swal.fire('Erro Crítico', 'Falha na requisição: ' + err.message, 'error');
            });
        }
        
        function humanizarTrabalho() {
            document.querySelectorAll('#caixas-texto textarea').forEach(t => {
                let chaveSegura = "{" + "{" + t.dataset.chave + "}" + "}";
                dicionarioEditavel[chaveSegura] = t.value;
            });

            const area = document.getElementById('area-edicao');
            const loading = document.getElementById('loading');
            
            document.getElementById('loading-icon').innerHTML = '<i class="ph-bold ph-shield-check" style="animation: pulse-brain 1.5s infinite; color: var(--warning);"></i>';
            document.getElementById('loading-title').innerText = "A Aplicar Blindagem Anti-IA (Isto pode demorar)...";
            document.getElementById('loading-title').style.color = "var(--warning)";

            area.style.display = 'none';
            loading.style.display = 'block';

            let payload = {
                tema: document.getElementById('tema').value,
                modelo: document.getElementById('select_modelo').value,
                prompt_id: document.querySelector('[name="prompt_id"]').value,
                dicionario: dicionarioEditavel
            };

            fetch('/humanizar_trabalho', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(!data.sucesso) { 
                    loading.style.display = 'none';
                    area.style.display = 'block';
                    document.getElementById('loading-title').style.color = "var(--primary)";
                    Swal.fire('Erro', data.erro, 'error'); 
                    return; 
                }
                
                localStorage.setItem('geracao_estado', JSON.stringify({
                    task_id: data.task_id,
                    aluno_id: document.getElementById('aluno_id').value,
                    tema: document.getElementById('tema').value
                }));

                pollInterval = setInterval(() => verificarStatusTask(data.task_id), 3000);
            })
            .catch(err => {
                loading.style.display = 'none';
                area.style.display = 'block';
                document.getElementById('loading-title').style.color = "var(--primary)";
                Swal.fire('Erro Crítico', 'Falha na requisição: ' + err.message, 'error');
            });
        }

        function cancelarGeracao() {
            let estadoStr = localStorage.getItem('geracao_estado');
            if(estadoStr) {
                let estado = JSON.parse(estadoStr);
                
                fetch('/cancelar_geracao/' + estado.task_id, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    clearInterval(pollInterval);
                    localStorage.removeItem('geracao_estado');
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('btn-submit').style.display = 'block';
                    document.getElementById('loading-title').style.color = "var(--primary)";
                    
                    Swal.fire({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, icon: 'info', title: 'Tarefa cancelada.', background: '#1e2130', color: '#e2e8f0' });
                })
                .catch(err => {
                    Swal.fire('Aviso', 'A tarefa já pode ter concluído ou houve falha na rede.', 'info');
                });
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('btn-submit').style.display = 'block';
            }
        }

        function verificarStatusTask(taskId) {
            fetch('/status_geracao/' + taskId)
            .then(res => res.json())
            .then(data => {
                if(data.status === 'Pendente') {
                    return;
                }
                
                clearInterval(pollInterval);
                localStorage.removeItem('geracao_estado'); 

                document.getElementById('loading').style.display = 'none';
                document.getElementById('btn-submit').style.display = 'block';
                document.getElementById('loading-title').style.color = "var(--primary)";

                if(data.status === 'Erro') {
                    Swal.fire('Erro da Inteligência', data.erro, 'error');
                } else if(data.status === 'Cancelado') {
                    // Limpou silenciosamente
                } else if(data.status === 'Concluido') {
                    dicionarioEditavel = data.dicionario;
                    montarEditor(dicionarioEditavel);
                    document.getElementById('area-edicao').style.display = 'block';
                    
                    Swal.fire({ 
                        toast: true, position: 'top-end', showConfirmButton: false, 
                        timer: 4000, icon: 'success', title: 'Processo concluído com sucesso!', 
                        background: '#1e2130', color: '#10b981' 
                    });
                }
            })
            .catch(err => {
                console.error("Erro na comunicação em segundo plano:", err);
            });
        }

        function regerarTrechoEspecifico(tag, txtElement, btn, wrapper, lbl, tit) {
            btn.innerText = "Lendo..."; 
            btn.disabled = true;
            
            fetch('/regerar_trecho', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tema: document.getElementById('tema').value, 
                    tag: tag, 
                    modelo: document.getElementById('select_modelo').value, 
                    prompt_id: document.querySelector('[name="prompt_id"]').value, 
                    dicionario: dicionarioEditavel
                })
            })
            .then(r => {
                if(!r.ok) throw new Error("Erro de rede");
                return r.json();
            })
            .then(data => {
                btn.innerText = "Regerar Tudo"; 
                btn.disabled = false;
                
                if(!data.sucesso) {
                    Swal.fire('Erro', data.erro, 'error');
                    return;
                }
                
                txtElement.value = data.novo_texto;
                
                let chaveSegura = "{" + "{" + tag + "}" + "}"; 
                dicionarioEditavel[chaveSegura] = data.novo_texto;
                
                wrapper.style.border = '1px solid var(--border)';
                lbl.innerHTML = `<b>${tit}</b>`; 
                lbl.style.color = "var(--secondary)";
            })
            .catch(err => {
                btn.innerText = "Regerar Tudo"; 
                btn.disabled = false;
                Swal.fire('Falha', 'Não foi possível regerar: ' + err.message, 'error');
            });
        }

        function montarEditor(dic) {
            const container = document.getElementById('caixas-texto'); 
            container.innerHTML = ''; 
            
            ordemOficial.forEach(chave => {
                let chaveSegura = "{" + "{" + chave + "}" + "}"; 
                let txt = dic[chaveSegura] ? dic[chaveSegura].trim() : "";
                let is_vazio = (txt === "");
                
                let wrap = document.createElement('div');
                wrap.style.cssText = `margin-bottom:20px; padding:15px; border-radius:8px; border: 1px solid ${is_vazio ? '#ef4444' : 'var(--border)'}; background: rgba(30,33,48,0.3);`;
                
                let head = document.createElement('div'); 
                head.style.cssText = "display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;";
                
                let lbl = document.createElement('label'); 
                lbl.innerHTML = `<b>${chave.replace(/_/g,' ')}</b>`; 
                lbl.style.color = is_vazio ? "#ef4444" : "var(--secondary)";
                
                let btn = document.createElement('button'); 
                btn.className = 'btn'; btn.innerText = "Regerar Tudo";
                
                let ta = document.createElement('textarea'); 
                ta.value = txt; ta.rows = is_vazio ? 2 : 4; ta.dataset.chave = chave; 
                ta.style.width = "100%"; ta.style.marginBottom = "10px";
                ta.onchange = (e) => { dicionarioEditavel[chaveSegura] = e.target.value; };
                btn.onclick = () => regerarTrechoEspecifico(chave, ta, btn, wrap, lbl, chave.replace(/_/g,' '));
                
                head.appendChild(lbl); head.appendChild(btn); 
                wrap.appendChild(head); wrap.appendChild(ta); 

                let chatDiv = document.createElement('div');
                chatDiv.style.cssText = "display:flex; gap:10px; margin-top:10px; align-items: stretch;";
                
                let chatInput = document.createElement('input');
                chatInput.placeholder = "IA de Ajuste Fino: Ex: 'Deixe mais formal' ou 'Resuma este trecho'...";
                chatInput.style.margin = "0"; chatInput.style.flex = "1";
                chatInput.style.padding = "10px";
                chatInput.style.borderRadius = "5px";
                chatInput.style.border = "1px solid var(--border)";
                chatInput.style.background = "#1e2130";
                chatInput.style.color = "#e2e8f0";
                
                let chatBtn = document.createElement('button');
                chatBtn.className = "btn btn-blue";
                chatBtn.style.padding = "10px 15px";
                chatBtn.style.margin = "0";
                chatBtn.innerHTML = "<i class='ph-bold ph-magic-wand'></i> Ajustar Trecho";
                
                chatBtn.onclick = () => {
                    let comando = chatInput.value; 
                    if(!comando) return;
                    chatBtn.disabled = true; chatBtn.innerText = "Aguarde...";
                    
                    fetch('/assistente_pontual', {
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ 
                            trecho: ta.value, 
                            comando: comando, 
                            modelo: document.getElementById('select_modelo').value 
                        })
                    })
                    .then(r => r.json())
                    .then(d => {
                        chatBtn.disabled = false; 
                        chatBtn.innerHTML = "<i class='ph-bold ph-magic-wand'></i> Ajustar Trecho";
                        if(d.sucesso) { 
                            ta.value = d.novo_texto; 
                            dicionarioEditavel[chaveSegura] = d.novo_texto; 
                            chatInput.value = ""; 
                        } else {
                            Swal.fire('Erro', d.erro, 'error');
                        }
                    })
                    .catch(e => { 
                        chatBtn.disabled=false; 
                        chatBtn.innerHTML="<i class='ph-bold ph-magic-wand'></i> Ajustar Trecho"; 
                        Swal.fire('Erro de Rede', 'Não foi possível comunicar com a IA.', 'error');
                    });
                };
                
                chatDiv.appendChild(chatInput); chatDiv.appendChild(chatBtn);
                wrap.appendChild(chatDiv);
                
                container.appendChild(wrap);
            });
        }

        setInterval(() => {
            if(Object.keys(dicionarioEditavel).length > 0) {
                localStorage.setItem('hubmaster_autosave', JSON.stringify({
                    aluno: document.getElementById('aluno_id').value,
                    dic: dicionarioEditavel
                }));
            }
        }, 10000); 

        function salvarEDocx() {
            Swal.fire({
                title: 'Opções de Salvamento',
                html: `
                    <div style="text-align: left;">
                        <label style="color: var(--text-muted); font-size: 0.9rem;">Nome do arquivo (Opcional, sem .docx):</label>
                        <input id="sw-doc-name" class="swal2-input" placeholder="Ex: Trabalho_Final_Matematica" style="width: 100%; margin: 5px 0 15px 0;">
                        
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-muted); font-size: 0.95rem; margin-top: 10px;">
                            <input type="checkbox" id="sw-doc-download" checked style="width: 20px; height: 20px; margin: 0; cursor: pointer;">
                            Quero baixar o arquivo no meu computador agora
                        </label>
                    </div>
                `,
                background: '#1e2130',
                color: '#e2e8f0',
                showCancelButton: true,
                confirmButtonText: '<i class="ph-bold ph-check-circle"></i> Confirmar e Salvar',
                confirmButtonColor: '#10b981',
                cancelButtonText: 'Cancelar',
                preConfirm: () => {
                    let nome = document.getElementById('sw-doc-name').value.trim();
                    let querBaixar = document.getElementById('sw-doc-download').checked;
                    return { nome: nome, download: querBaixar };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    processarSalvamento(result.value.nome, result.value.download);
                }
            });
        }

        function processarSalvamento(nomeArquivo, querBaixar) {
            const btn = document.getElementById('btn-docx');
            btn.disabled = true;
            btn.innerHTML = `<i class="ph-bold ph-spinner ph-spin"></i> Gerando Documento...`;
            
            document.querySelectorAll('#caixas-texto textarea').forEach(t => {
                let chaveSegura = "{" + "{" + t.dataset.chave + "}" + "}";
                dicionarioEditavel[chaveSegura] = t.value;
            });
            
            fetch('/gerar_docx_final', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ 
                    dicionario: dicionarioEditavel, 
                    aluno_id: document.getElementById('aluno_id').value,
                    nome_arquivo: nomeArquivo 
                }) 
            })
            .then(r => {
                if(!r.ok) throw new Error("Erro ao criar DOCX no servidor.");
                return r.json();
            })
            .then(d => {
                btn.disabled = false;
                btn.innerHTML = `<i class="ph-bold ph-check-circle"></i> Aprovar Tudo e Salvar DOCX Final`;
                
                if(!d.sucesso) {
                    Swal.fire('Erro', d.erro, 'error');
                    return;
                }
                
                if (querBaixar) {
                    let a = document.createElement('a'); 
                    a.href = 'data:application/vnd.openxmlformats-officedocument.wordprocessingml.document;base64,' + d.arquivo_base64;
                    a.download = d.nome_arquivo || "Trabalho_IA.docx"; 
                    a.click();
                    
                    Swal.fire('Sucesso!', 'Documento gerado, baixado e salvo na pasta do Cliente.', 'success');
                } else {
                    Swal.fire('Sucesso!', 'Documento final guardado em segurança na pasta do Cliente.', 'success');
                }
                
                localStorage.removeItem('hubmaster_autosave');
                document.getElementById('area-edicao').style.display = 'none';
                document.getElementById('tema').value = '';
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerHTML = `<i class="ph-bold ph-check-circle"></i> Aprovar Tudo e Salvar DOCX Final`;
                Swal.fire('Falha Crítica', err.message, 'error');
            });
        }
    </script>
{% endblock %}
