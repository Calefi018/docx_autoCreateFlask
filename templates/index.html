{% extends "base.html" %}
{% block content %}

<div style="margin-bottom: 30px;">
    <h1 style="margin-top:0; color: var(--primary); font-size: 24px; display: flex; align-items: center; gap: 10px;">
        <i class="ph-bold ph-sparkle"></i> Gerador de Trabalhos Acadêmicos
    </h1>
    <p style="color: var(--text-muted); margin: 5px 0 0 0; font-size: 14px;">
        Cole o desafio, selecione o cliente e a IA montará o documento completo.
    </p>
</div>

<div class="card">
    <form id="form-gerar">
        <div style="margin-bottom: 20px;">
            <label style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">1. Vincular a um Cliente (Opcional)</label>
            <select name="cliente_id" id="cliente_id">
                <option value="">-- Apenas Baixar Documento (Avulso) --</option>
                {% for a in alunos %}
                    <option value="{{ a.id }}">{{ a.nome }} - {{ a.curso }}</option>
                {% endfor %}
            </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">2. Tema / Instruções do Desafio</label>
            <textarea name="tema" id="tema" rows="6" placeholder="Cole aqui as instruções da faculdade..." required style="resize: vertical;"></textarea>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px;">
            <div>
                <label style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">3. Engenharia de Prompt (Cérebro)</label>
                <select name="prompt_id" id="prompt_id">
                    {% for p in prompts %}
                        <option value="{{ p.id }}">{{ p.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px; display: block; font-weight: 600;">4. Inteligência Principal</label>
                <select name="modelo" id="modelo">
                    {% for m in modelos %}
                        <option value="{{ m }}">{{ m }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button type="submit" id="btn-gerar" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 15px;">
            <i class="ph-bold ph-magic-wand"></i> Iniciar Processamento IA
        </button>
    </form>
    
    <div id="painel-status" style="display: none; margin-top: 25px; padding: 25px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 8px; text-align: center;">
        <i class="ph-bold ph-spinner-gap" style="font-size: 36px; color: var(--primary); animation: spin 1s linear infinite; margin-bottom: 15px; display: inline-block;"></i>
        <h3 id="texto-status" style="color: var(--text-main); font-size: 16px; margin-bottom: 8px; font-weight: 600;">A processar informações...</h3>
        <p style="color: var(--text-muted); font-size: 13px;">A IA está a redigir o documento. Isto pode levar entre 30 a 60 segundos.</p>
    </div>
</div>

<style>
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<script>
    let taskIdAtual = null;
    let intervalStatus = null;

    document.getElementById('form-gerar').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-gerar');
        const painel = document.getElementById('painel-status');
        const txtStatus = document.getElementById('texto-status');
        
        btn.disabled = true;
        btn.style.opacity = '0.5';
        painel.style.display = 'block';
        txtStatus.innerText = 'Iniciando arquitetura de texto...';

        const formData = new FormData(this);
        
        fetch('/gerar_rascunho', { method: 'POST', body: formData })
        .then(response => response.json())
        .then(data => {
            if(data.sucesso) {
                taskIdAtual = data.task_id;
                txtStatus.innerText = 'IA escrevendo o documento...';
                intervalStatus = setInterval(verificarStatus, 3000);
            } else {
                Swal.fire({icon: 'error', title: 'Erro', text: data.erro, background: '#18181b', color: '#fafafa'});
                resetUI();
            }
        });
    });

    function verificarStatus() {
        fetch('/status_geracao/' + taskIdAtual)
        .then(r => r.json())
        .then(data => {
            if (data.status === 'Concluido') {
                clearInterval(intervalStatus);
                document.getElementById('texto-status').innerText = 'Documento Finalizado! Gerando Word...';
                
                // Envia para gerar o Word
                fetch('/gerar_docx_final', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        dicionario: data.dicionario,
                        aluno_id: document.getElementById('cliente_id').value,
                        nome_arquivo: 'Trabalho_IA.docx'
                    })
                })
                .then(r => r.json())
                .then(res => {
                    resetUI();
                    if(res.sucesso) {
                        Swal.fire({icon: 'success', title: 'Pronto!', text: 'Trabalho salvo na pasta do cliente.', background: '#18181b', color: '#fafafa'});
                        
                        // Baixa o arquivo automaticamente
                        const link = document.createElement('a');
                        link.href = 'data:application/vnd.openxmlformats-officedocument.wordprocessingml.document;base64,' + res.arquivo_base64;
                        link.download = res.nome_arquivo;
                        link.click();
                    } else {
                        Swal.fire({icon: 'error', title: 'Erro no Word', text: res.erro, background: '#18181b', color: '#fafafa'});
                    }
                });
            } else if (data.status === 'Erro') {
                clearInterval(intervalStatus);
                Swal.fire({icon: 'error', title: 'Falha na IA', text: data.erro, background: '#18181b', color: '#fafafa'});
                resetUI();
            }
        });
    }

    function resetUI() {
        document.getElementById('btn-gerar').disabled = false;
        document.getElementById('btn-gerar').style.opacity = '1';
        document.getElementById('painel-status').style.display = 'none';
    }
</script>
{% endblock %}
